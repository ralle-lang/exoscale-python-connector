name: upstream-drift

# Weekly watch for upstream changes that could make this connector stale:
# - the APIv2 OpenAPI spec (detailed, spec-aware oasdiff changelog)
# - the official `exoscale` SDK version on PyPI (release-level cue only)
#
# On change it files an `upstream-drift` issue to EVALUATE — never to
# auto-fix (decision D1, docs/roadmap.md: a spec diff is a prompt for
# human+agent review; the spec is the starting point, not the truth).
# The committed snapshots under .github/upstream/ are advanced during
# triage, inside the reviewed triage PR — NOT pushed by this bot. That
# keeps main's branch protection intact and moves the baseline only once a
# human has accepted the drift (consistent with D1).
#
# Injection hygiene: upstream-controlled text (changelog, version strings)
# reaches issues only via --body-file / env vars, never shell interpolation.

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read # checkout only; snapshots are advanced during triage, not here
  issues: write # file the drift issues

concurrency:
  group: upstream-drift

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      # The oasdiff step runs in Docker with only the workspace mounted,
      # so all working files live in ./.drift (never committed).
      - name: Fetch and normalize the current APIv2 spec
        run: |
          mkdir -p .drift
          curl -fsSL --retry 3 https://openapi-v2.exoscale.com/source.json -o .drift/spec-raw.json
          jq -S . .drift/spec-raw.json > .drift/spec.json

      - name: Detect spec drift
        id: spec
        run: |
          if cmp -s .drift/spec.json .github/upstream/openapi-v2.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate spec changelog
        if: steps.spec.outputs.changed == 'true'
        uses: oasdiff/oasdiff-action/changelog@024f6c399f9a21ada1addb0f9a36ce1bfac995f1 # v0.1.6
        with:
          base: .github/upstream/openapi-v2.json
          revision: .drift/spec.json
          output-to-file: .drift/changelog.md
          # Cron-only workflow with no PR context: suppress the v0.1.x
          # side-by-side review feature (external ciphertext upload + notices).
          review: false

      - name: Build spec drift issue body
        if: steps.spec.outputs.changed == 'true'
        run: |
          python -m pip install --quiet -e .
          {
            echo "Automated drift report: the APIv2 OpenAPI spec changed upstream."
            echo
            echo "## Evaluation checklist"
            echo "- [ ] Review the changelog and the **Affected connector modules** section below; focus on the modules it names"
            echo "- [ ] New/changed **request** fields: compare against the pydantic models (response-side additions are tolerated by \`extra=\"allow\"\`)"
            echo "- [ ] Check whether any documented gotcha on the affected asset pages still holds"
            echo "- [ ] Decide live re-verification scope (tier flags, docs/live-test-plan.md)"
            echo "- [ ] Update models/docs as needed; regenerate AI artifacts (\`python scripts/generate_llms_txt.py\`)"
            echo
            echo "The committed snapshot is advanced during triage (in the reviewed triage PR), not by this bot, so it still reflects the pre-change baseline below."
            echo
            echo "## Affected connector modules"
            echo
            echo "Changed spec paths mapped to the modules that call them. The base"
            echo "(\`.github/upstream/openapi-v2.json\`) is still the pre-change snapshot at"
            echo "this step, so this diff reflects exactly what changed this run."
            echo
            python scripts/drift_operations.py --affected \
              .github/upstream/openapi-v2.json .drift/spec.json
            echo
            echo "## Model ↔ spec field drift"
            echo
            echo "Each pydantic resource model diffed against the **incoming** spec's"
            echo "schema (renamed/removed/retyped fields and newly-required fields fail"
            echo "unit CI; unmodelled optional fields are informational, tolerated by"
            echo "\`extra=\"allow\"\`). A failing row here means \`tests/unit/test_model_schema_drift.py\`"
            echo "will go red once the snapshot is refreshed — reconcile the model or"
            echo "record an intentional divergence in \`scripts/model_schema_drift.py\`."
            echo
            python scripts/model_schema_drift.py --summary .drift/spec.json
            echo
            echo "## Changelog (oasdiff)"
            echo
            head -c 60000 .drift/changelog.md
            echo
            echo
            echo "## Spec path → connector module mapping (full legend)"
            echo
            python scripts/upstream_drift_map.py
          } > .drift/issue.md

      - name: File or update spec drift issue
        if: steps.spec.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: "Upstream drift: APIv2 OpenAPI spec changed"
        run: |
          existing="$(gh issue list --label upstream-drift --state open --json number,title \
            --jq "[.[] | select(.title == \"$TITLE\")][0].number // empty")"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file .drift/issue.md
          else
            gh issue create --title "$TITLE" --label upstream-drift --body-file .drift/issue.md
          fi

      - name: Check the official SDK version on PyPI
        id: sdk
        run: |
          latest="$(curl -fsSL --retry 3 https://pypi.org/pypi/exoscale/json | jq -r .info.version)"
          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          if [ "$latest" = "$(cat .github/upstream/python-exoscale-version.txt)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: File or update SDK release issue
        if: steps.sdk.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST: ${{ steps.sdk.outputs.latest }}
          TITLE: "Upstream drift: new official exoscale SDK release on PyPI"
        run: |
          {
            echo "Automated drift report: a new version of the official \`exoscale\` SDK is on PyPI."
            echo
            printf 'Previous: `%s` — current: `%s`\n' \
              "$(cat .github/upstream/python-exoscale-version.txt)" "$LATEST"
            echo
            echo "## Evaluation checklist"
            echo "- [ ] Re-check that the README \"Relationship to the official Exoscale SDK\" paragraph still holds"
            echo "- [ ] Skim the SDK changes for APIv2 surface hints the spec watch may have missed"
          } > .drift/sdk-issue.md
          existing="$(gh issue list --label upstream-drift --state open --json number,title \
            --jq "[.[] | select(.title == \"$TITLE\")][0].number // empty")"
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file .drift/sdk-issue.md
          else
            gh issue create --title "$TITLE" --label upstream-drift --body-file .drift/sdk-issue.md
          fi

      # Note: the committed snapshots under .github/upstream/ are intentionally
      # NOT refreshed here. main is protection-ruled (PR + status checks), so a
      # bot push is rejected; more importantly D1 says the baseline should move
      # only once a human has triaged the drift. The snapshot is therefore
      # advanced inside the reviewed triage PR (see the exoscale-drift-triage
      # skill). Until then this issue stays open and re-runs append a dedup
      # comment instead of opening duplicates.
