name: Release

# On version tags (v0.2.0, v1.0.0, ...) this builds the package, publishes it to
# PyPI via trusted publishing (no API token in the repo), and creates a matching
# GitHub Release whose notes come from the CHANGELOG section for that version.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.12"
      - name: Run the full check suite before building
        run: |
          pip install -e '.[dev]'
          ruff check src tests
          mypy src
          pytest tests/unit -q
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist/
      # Pinned to a commit SHA: this third-party action receives the OIDC
      # token that authorizes publishing; a floating branch ref would let a
      # compromised upstream publish on our behalf. Bump deliberately.
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # release/v1 as of 2026-02-18
        with:
          # PEP 740 build attestations. The action defaults this on for Trusted
          # Publishing; set it explicitly so it can never silently regress.
          attestations: true

  github-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub Release on this tag
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          name: dist
          path: dist/
      - name: Extract the CHANGELOG section for this tag
        # TAG comes from the (maintainer-controlled) tag ref; pass it via env and
        # reference it as a shell variable rather than interpolating into the
        # script, so the tag string is never evaluated as code.
        env:
          TAG: ${{ github.ref_name }}
        run: |
          version="${TAG#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {flag=1; next}
            flag && /^## \[/ {exit}
            flag {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then printf 'Release %s\n' "$TAG" > release-notes.md; fi
      # Pinned to a commit SHA (this third-party action gets a contents:write
      # token); bump deliberately.
      - uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b  # v3.0.1
        with:
          body_path: release-notes.md
          files: dist/*
          fail_on_unmatched_files: false
