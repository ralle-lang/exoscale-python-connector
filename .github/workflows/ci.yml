name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Lower and upper bounds of the supported range (requires-python >=3.9).
        python-version: ["3.9", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with dev dependencies
        run: pip install -e '.[dev]'
      - name: Lint
        run: ruff check src tests scripts
      - name: Type-check
        run: mypy src
      - name: Unit tests
        run: pytest tests/unit -q
      - name: Check AI reference bundle is in sync
        run: python scripts/generate_llms_txt.py --check
      # Integration tiers (tests/integration) need live tenant credentials and
      # are deliberately NOT run in CI — see docs/live-test-plan.md.

  min-deps:
    # Install against the DECLARED MINIMUM dependency versions (the floors in
    # pyproject.toml, pinned in ci/constraints-min.txt and kept honest by
    # tests/unit/test_min_constraints.py) on the floor Python. A too-low floor —
    # code relying on a newer requests/pydantic API than declared — fails here
    # rather than in a user's environment. The `test` job above covers latest.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6
        with:
          python-version: "3.9"  # floor Python + floor deps = the tightest combo
      - name: Install at minimum dependency versions
        run: pip install -e '.[dev]' -c ci/constraints-min.txt
      - name: Type-check
        run: mypy src
      - name: Unit tests
        run: pytest tests/unit -q
